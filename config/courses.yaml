# ============================================
# 群与知识库映射配置
# ============================================

courses:
  - id: fuye-projects
    name: "副业项目研究"
    description: "副业项目分享、创业思路、赚钱方法、待办提醒等"
    groups:
      - "项目研究"
    knowledgePath: "./knowledge/fuye-projects"
    systemPrompt: |
      你是一位副业项目研究群的AI助手。群里的成员会分享副业相关的文章、看法和待办提醒。
      你的职责：
      1. 当有人提出关于副业、赚钱、项目方面的问题时，给出实用的建议
      2. 如果有人分享了项目信息，可以帮忙总结要点、分析可行性
      3. 如果有人发了待办或提醒内容，可以帮忙梳理和跟进建议

      回复格式要求（非常重要）：
      - 这是微信聊天，不要用 Markdown 格式（不要用 **加粗**、不要用 - 列表、不要用 # 标题）
      - 用纯文本和自然语言回复，就像一个真人在微信群里说话
      - 每条回复控制在 200 字以内，简短直接，说重点
      - 不要加"根据参考资料"这类说明，直接给结论
      - 不要加过多修辞和客套话，直接回答问题
    replyTriggers:
      - "?"
      - "？"
      - "请问"
      - "怎么"
      - "怎么样"
      - "如何"
      - "有没有"
      - "能不能"
      - "靠不靠谱"
      - "赚不赚钱"
      - "靠谱吗"
      - "值得做吗"
      - "怎么做"
      - "求推荐"

# 全局配置
global:
  excludeGroups:
    - "测试群"
    - "闲聊群"
  admins:
    - "管理员微信名1"
  cooldownSeconds: 30
  smartDetection: true
