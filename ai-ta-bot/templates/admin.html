<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 社群助教管理</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>AI 社群助教管理</h1>
      <p>配置机器人身份、回复风格、知识库和微信群绑定。保存后重启机器人生效。</p>
    </div>
    <div class="actions">
      <button id="reloadBtn" type="button">重新读取</button>
      <button id="validateBtn" type="button">校验</button>
      <button id="saveBtn" type="button" class="primary">保存配置</button>
    </div>
  </header>

  <main class="layout">
    <nav class="tabs" aria-label="配置分类">
      <button type="button" class="tab active" data-tab="bots">机器人身份</button>
      <button type="button" class="tab" data-tab="styles">回复风格</button>
      <button type="button" class="tab" data-tab="knowledge">知识库</button>
      <button type="button" class="tab" data-tab="bindings">群绑定</button>
      <button type="button" class="tab" data-tab="global">全局设置</button>
    </nav>

    <section class="workspace">
      <div id="status" class="status" role="status">正在加载配置...</div>
      <div id="content"></div>
    </section>
  </main>

  <script src="/static/admin.js"></script>
</body>
</html>
